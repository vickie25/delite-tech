<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Jost:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8F8F8;
            font-family: 'Jost', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 60px 40px;
            border: 1px solid #E5E5E5;
            border-radius: 4px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-text {
            font-family: 'Bodoni Moda', serif;
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        .content {
            text-align: center;
        }
        h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 36px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 24px;
            line-height: 1.1;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666666;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background-color: #000000;
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .footer {
            margin-top: 60px;
            text-align: center;
            padding-top: 40px;
            border-top: 1px solid #EEEEEE;
        }
        .footer-text {
            font-size: 12px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-text">Delight Tech</div>
        </div>
        <div class="content">
            <h1>Welcome to the <br>Future of Hardware.</h1>
            <p>Your account has been successfully authorized. You are now part of an elite community dedicated to high-performance, minimalist technology.</p>
            <a href="https://delight.tech/shop" class="btn">Explore the Collection</a>
        </div>
        <div class="footer">
            <div class="footer-text">&copy; 2026 Delight Tech. All rights reserved.</div>
        </div>
    </div>
</body>
</html>
